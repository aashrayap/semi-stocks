thesis_signals:
  - bottleneck: n3_logic
    direction: confirms
    evidence: >
      Intel's first 18A products launched, but Q1 revenue guidance is only $11.7B-$12.7B and
      management said available supply bottoms in Q1 before improving later. Alternative advanced
      capacity still is not large enough to unwind the main wafer shortage.

  - bottleneck: foundry
    direction: confirms
    evidence: >
      Intel Foundry generated $4.5B of Q4 revenue and the first 18A products launched. That makes
      Intel a real alternative-capacity datapoint, but still a ramp rather than an immediate relief valve.

