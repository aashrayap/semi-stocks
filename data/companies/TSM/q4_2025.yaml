      Q4 revenue reached $33.73B, 3nm already represented 28% of wafer revenue, and advanced
      nodes reached 77%. TSMC then guided Q1 to $34.6B-$35.8B, showing leading-edge demand
      still outrunning supply.

  - bottleneck: foundry
    direction: confirms
    evidence: >
      TSMC raised its 2026 capital budget to $52B-$56B and is still converting capacity across
      nodes to support demand. The supply response required is enormous even before any surplus exists.

